  #finalizer_module: "certificat.modules.acme.backends.sectigo.SectigoFinalizer"
  trust_proxy_forwarded_proto: True
  
  # MySQL 
  db:
    type: mysql
    name: certificat
    user: root
    # provided by env
    # password: ""
    host: mariadb.

  # Postgres
  # db:
  #   type: postgresql
  #   name: certificat
  #   user: postgres
  #   host: postgres.

  # SQLite
  # db: 
  #   type: sqlite
  #   name: ":memory:"
  
  redis:
    backend: django.core.cache.backends.redis.RedisCache
    host: redis.
    # provided by env
    # password: ""

  # Uses Redis cache if omitted
  cache:
    type: local

  # authentication:
  #   type: remote
  #   log_http_headers: true
  #   redirect_template: https://example.localhost/rd={redirect}

  authentication:
    type: saml
    debug: True
    administrators:
      - admusr
    attribute_mapping:
      mail: [username, email]
      uid: [username]
      eduPersonPrincipalName: [username]
      givenName: [first_name]
      sn: [last_name]
    #discovery:
    #  service: "https://service.seamlessaccess.org/ds"
    sp:
      entity_id: "http://certificat.dev.localhost/saml2/metadata/"
      key_file: "/workspaces/certificat/src/certificat_dev/saml/insecure.key"
      cert_file: "/workspaces/certificat/src/certificat_dev/saml/insecure.crt"
    idp:
      remote: 
        - url: "http://idp./saml2/metadata"
      mdq: 
        - url: "https://mdq.incommon.org"
          cert: "/workspaces/certificat/src/certificat_dev/saml/inc-md-cert-mdq.pem"
          freshness_period: "P0Y0M0DT2H0M0S"

  logging:
    certificat_level: DEBUG
    acmev2_level: DEBUG

  healthcheck_allowed_networks:
    - '172.19.0.0/16'

