{% if messages %}
{% for message in messages %}
{% if message.level == DEFAULT_MESSAGE_LEVELS.ERROR %}
    <c-message type="error">{{ message }}</c-message>
{% elif message.level == DEFAULT_MESSAGE_LEVELS.WARNING %}
    <c-message type="warning">{{ message }}</c-message>
{% else %}
    <c-message type="success">{{ message }}</c-message>
{% endif %}
{% endfor %}
{% endif %}
