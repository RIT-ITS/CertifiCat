certificat:
  url_root: "https://{{ .Values.ingress.hostname }}"
  login_method: {{ .Values.certificat.login_method | quote }}
  finalizer_module: {{ .Values.certificat.finalizer_module | quote }}
  db:
    name: certificat
    user: certificat
    host: mariadb-service.{{ .Release.Namespace }}
  redis:
    host: redis-service.{{ .Release.Namespace }}

{{- if eq $.Values.certificat.login_method "saml" }}
saml:
  debug: {{ $.Values.certificat.saml.debug }}
  administrators:
    {{- $admins := split "," $.Values.certificat.saml.administrators }}
    {{- range $admins }}
    - "{{ . | trim }}"
    {{- end }}
  attribute_mapping:
    eduPersonPrincipalName: ["{{ $.Values.certificat.saml.attribute_mapping.eduPersonPrincipalName }}"]
    mail: ["{{ $.Values.certificat.saml.attribute_mapping.mail }}"]
    givenName: ["{{ $.Values.certificat.saml.attribute_mapping.givenName }}"]
    sn: ["{{ $.Values.certificat.saml.attribute_mapping.sn }}"]
  sp:
    entity_id: "{{ $.Values.certificat.saml.sp.entity_id }}"
    key_file: "/etc/certificat/sp.key"
    cert_file: "/etc/certificat/sp.crt"
  {{- if $.Values.certificat.saml.idp.remote_url }}
  idp:
    remote:
      - url: "{{ $.Values.certificat.saml.idp.remote_url }}"
  {{- else }}
  idp:
    mdq:
      - url: "{{ $.Values.certificat.saml.idp.mdq.url }}"
        cert: "{{ $.Values.certificat.saml.idp.mdq.cert }}"
        freshness_period: "{{ $.Values.certificat.saml.idp.mdq.freshness_period }}"
  {{- end }}
{{- end }}

{{- if eq .Values.certificat.finalizer_module "certificat.modules.acme.backends.sectigo.SectigoFinalizer" }}
sectigo_finalizer:
  {{- if .Values.sectigo_finalizer.org_id }}
  org_id: {{ .Values.sectigo_finalizer.org_id }}
  {{- end }}
  {{- if .Values.sectigo_finalizer.cert_profile_id }}
  cert_profile_id: {{ .Values.sectigo_finalizer.cert_profile_id }}
  {{- end }}
  {{- if .Values.sectigo_finalizer.cert_validity_period }}
  cert_validity_period: {{ .Values.sectigo_finalizer.cert_validity_period }}
  {{- end }}
  {{- if .Values.sectigo_finalizer.customer_uri }}
  customer_uri: {{ .Values.sectigo_finalizer.customer_uri }}
  {{- end }}
  {{- if .Values.sectigo_finalizer.api_base }}
  api_base: {{ .Values.sectigo_finalizer.api_base }}
  {{- end }}
  {{- if .Values.sectigo_finalizer.api_user }}
  api_user: {{ .Values.sectigo_finalizer.api_user }}
  {{- end }}
  {{- if .Values.sectigo_finalizer.api_password }}
  api_password: "{{ .Values.sectigo_finalizer.api_password }}"
  {{- end }}
  {{- if .Values.sectigo_finalizer.approval_api_user }}
  approval_api_user: {{ .Values.sectigo_finalizer.approval_api_user }}
  {{- end }}
  {{- if .Values.sectigo_finalizer.approval_api_password }}
  approval_api_password: "{{ .Values.sectigo_finalizer.approval_api_password }}"
  {{- end }}
  {{- if .Values.sectigo_finalizer.external_requester_override }}
  external_requester_override: {{ .Values.sectigo_finalizer.external_requester_override }}
  {{- end }}
{{- end}}

{{- if eq .Values.certificat.finalizer_module "certificat.modules.acme.backends.local.LocalFinalizer" }}
  {{- if or .Values.certificat.local_finalizer.key .Values.certificat.local_finalizer.cert }}
local_finalizer:
    {{- if .Values.certificat.local_finalizer.key }}
  key: |
{{ .Values.certificat.local_finalizer.key | nindent 4 }}
    {{- end }}
    {{- if .Values.certificat.local_finalizer.cert }}
  cert: |
{{ .Values.certificat.local_finalizer.cert | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}