services:
  # vim /usr/lib/python3/dist-packages/certbot/configuration.py
  # adjust no_verify_ssl to return True
  # Register account
  # certbot certonly --standalone --server "https://certificat.dev.localhost/directory" -d certbot.dev.localhost
  certbot:
    networks: 
      - proxy
      - backend
    build:
      context: .
      dockerfile: Dockerfile.certbot
    command: sleep infinity
    volumes:
      - ./certbot:/opts/certbot
    ports:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.certbot.rule=Host(`certbot.dev.localhost`)"
      - "traefik.http.routers.certbot.tls=false"
      - "traefik.http.services.certbot.loadbalancer.server.port=80"

      - "traefik.docker.network=traefik.proxy"
    extra_hosts:
    - "certificat.dev.localhost:host-gateway"

  etcd:
    networks:
      - proxy
      - backend
    image: quay.io/coreos/etcd:v3.5.0
    environment:
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ALLOW_NONE_AUTHENTICATION=yes
    ports:
      - "2379"
    
  coredns:
    networks:
      - backend
    image: coredns/coredns:latest
    command: -conf /etc/coredns/Corefile -dns.port 53
    volumes:
      - ./coredns:/etc/coredns
    depends_on:
      - etcd

  certificat:
    networks: 
      - proxy
      - backend
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    ports:
      - "8000"
      - "5173"
    volumes:
      - ../..:/workspaces:cached
    # Overrides default command so things don't shut down after the process ends.
    command: sleep infinity
    environment:
      CERTIFICAT__SECRET_KEY: ${_DJ_SECRET_KEY}
      # Uncomment to use MySQL
      CERTIFICAT__DB__PASSWORD: ${_DJ_MYSQL_ROOT_PWD}
      # Uncomment to use Postgres
      #CERTIFICAT__DB__PASSWORD: ${_DJ_POSTGRES_PWD}
      CERTIFICAT__REDIS__PASSWORD: ${_DJ_REDIS_PWD}
      CERTIFICAT__CONFIG: "/workspaces/certificat/src/certificat_dev/config.yml"
    labels:
      - "traefik.enable=true"

      # django route
      - "traefik.http.routers.certificat.entrypoints=websecure"
      - "traefik.http.routers.certificat.tls=true"
      - "traefik.http.routers.certificat.rule=Host(`certificat.dev.localhost`)"
      - "traefik.http.routers.certificat.service=certificat"
      - "traefik.http.services.certificat.loadbalancer.server.port=8000"

      # vite route
      - "traefik.http.routers.certificat-vite.entrypoints=websecure"
      - "traefik.http.routers.certificat-vite.tls=true"
      - "traefik.http.routers.certificat-vite.rule=Host(`certificat-vite.dev.localhost`)"
      - "traefik.http.routers.certificat-vite.service=certificat-vite"
      - "traefik.http.services.certificat-vite.loadbalancer.server.port=5173"

      - "traefik.docker.network=traefik.proxy"
    extra_hosts:
    - "certbot.dev.localhost:host-gateway"

  mariadb:
    networks: 
      - backend
    image: mariadb:10.11.16-jammy
    restart: unless-stopped
    volumes:
      - mariadb-data:/var/lib/mysql
    environment:
      - MARIADB_ROOT_PASSWORD=${_DJ_MYSQL_ROOT_PWD}

  postgres:
    networks:
      - backend
    image: postgres:18.3
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql
    environment:
      - POSTGRES_PASSWORD=${_DJ_POSTGRES_PWD}

  redis:
    networks:
      - backend
    image: redis:8.6.1
    restart: unless-stopped
    command: redis-server --save 60 1 --requirepass ${_DJ_REDIS_PWD}

  idp:
    networks: 
      - proxy
    image: ghcr.io/rit-its/pyidp:v0.0.12
    command: start_server
    ports: 
      - 8000
    environment:
      SECRET_KEY: "${_PYIDP_SECRET_KEY}"
      BASE_URL: "https://idp.dev.localhost"
      IDP_CRT: "${_PYIDP_CERT}"
      IDP_KEY: "${_PYIDP_KEY}"
      SP_METADATA: |
        <ns0:EntityDescriptor xmlns:ns0="urn:oasis:names:tc:SAML:2.0:metadata"
            xmlns:ns1="urn:oasis:names:tc:SAML:metadata:algsupport"
            xmlns:ns2="http://www.w3.org/2000/09/xmldsig#"
            entityID="http://certificat.dev.localhost/saml2/metadata/">
            <ns0:Extensions>
                <ns1:DigestMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#md5" />
                <ns1:DigestMethod Algorithm="http://www.w3.org/2001/04/xmlenc#ripemd160" />
                <ns1:DigestMethod Algorithm="http://www.w3.org/2000/09/xmldsig#sha1" />
                <ns1:DigestMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#sha224" />
                <ns1:DigestMethod Algorithm="http://www.w3.org/2001/04/xmlenc#sha256" />
                <ns1:DigestMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#sha384" />
                <ns1:DigestMethod Algorithm="http://www.w3.org/2001/04/xmlenc#sha512" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2000/09/xmldsig#dsa-sha1" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2009/xmldsig11#dsa-sha256" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#ecdsa-sha1" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#ecdsa-sha224" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#ecdsa-sha256" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#ecdsa-sha384" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#ecdsa-sha512" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#rsa-md5" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#rsa-ripemd160" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2000/09/xmldsig#rsa-sha1" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#rsa-sha224" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#rsa-sha256" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#rsa-sha384" />
                <ns1:SigningMethod Algorithm="http://www.w3.org/2001/04/xmldsig-more#rsa-sha512" />
            </ns0:Extensions>
            <ns0:SPSSODescriptor protocolSupportEnumeration="urn:oasis:names:tc:SAML:2.0:protocol"
                AuthnRequestsSigned="false" WantAssertionsSigned="false">
                <ns0:KeyDescriptor use="signing">
                    <ns2:KeyInfo>
                        <ns2:X509Data>
                            <ns2:X509Certificate>
                                </ns2:X509Certificate>
                        </ns2:X509Data>
                    </ns2:KeyInfo>
                </ns0:KeyDescriptor>
                <ns0:KeyDescriptor use="encryption">
                    <ns2:KeyInfo>
                        <ns2:X509Data>
                            <ns2:X509Certificate>
                                </ns2:X509Certificate>
                        </ns2:X509Data>
                    </ns2:KeyInfo>
                </ns0:KeyDescriptor>
                <ns0:SingleLogoutService Binding="urn:oasis:names:tc:SAML:2.0:bindings:HTTP-Redirect"
                    Location="https://certificat.dev.localhost/saml2/ls/" />
                <ns0:SingleLogoutService Binding="urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST"
                    Location="https://certificat.dev.localhost/saml2/ls/post/" />
                <ns0:NameIDFormat>urn:oasis:names:tc:SAML:2.0:nameid-format:transient</ns0:NameIDFormat>
                <ns0:AssertionConsumerService Binding="urn:oasis:names:tc:SAML:2.0:bindings:HTTP-POST"
                    Location="https://certificat.dev.localhost/saml2/acs/" index="1" />
            </ns0:SPSSODescriptor>
            <ns0:Organization>
                <ns0:OrganizationName xml:lang="en">Rochester Institute of Technology</ns0:OrganizationName>
                <ns0:OrganizationDisplayName xml:lang="en">RIT</ns0:OrganizationDisplayName>
                <ns0:OrganizationURL xml:lang="en">https://rit.edu/</ns0:OrganizationURL>
            </ns0:Organization>
        </ns0:EntityDescriptor>
    volumes:
      - "../src/certificat_dev/saml/saml-profiles.yaml:/etc/pyidp/profiles.yaml:ro"
      # Later
      #- pyidp-sessions:/tmp/flask-sessions
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.idp.rule=Host(`idp.dev.localhost`)"
      - "traefik.http.routers.idp.tls=true"
      - "traefik.http.services.idp.loadbalancer.server.port=80"
      
      - "traefik.docker.network=traefik.proxy"
volumes:
  mariadb-data:
  postgres-data:
  # Later
  #pyidp-sessions:

networks:
  proxy:
    name: traefik.proxy
    external: true
  backend:
    name: certificat.backend