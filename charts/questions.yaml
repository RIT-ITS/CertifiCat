questions:
  - variable: persistentVolumeClaim.storageClassName
    default: nfs-client
    description: What storage class to use for the PersistentVolumeClaim
    type: string
    label: persistentVolumeClaim.storageClassName

  - variable: ingress.hostname
    default: certificat.k8s-admin.its.maine.edu
    description: Hostname of your Certificat Instance
    type: string
    label: Hostname

  - variable: certificat_image.repository
    default: ghcr.io/rit-its/certificat
    description: Repository url for the Certificat container image
    type: string
    label: Repository

  - variable: certificat_image.tag
    label: Image Tag
    description: "Leave blank to use default (chart version); use 'latest' to pull the latest image"
    type: string
    required: false
    default: latest

  - variable: certificat.login_method
    label: "Login Method"
    description: "Choose authentication mode for CertifiCat"
    type: enum
    required: true
    default: "local"
    options:
      - "saml"
      - "local"

  # SAML-Specific Fields
  - variable: certificat.saml.debug
    label: "SAML Debug Mode"
    description: "Enable debug logging for SAML"
    type: boolean
    default: false
    show_if: "certificat.login_method=saml"
    group: certificat_saml

  - variable: certificat.saml.administrators
    label: "SAML Admin Users"
    description: "Comma-separated list of admin usernames for SAML"
    type: string
    default: "admin"
    show_if: "certificat.login_method=saml"
    group: certificat_saml

  - variable: certificat.saml.sp.entity_id
    label: "SAML SP Entity ID"
    description: "The Service Provider (SP) entity ID"
    type: string
    default: "http://certificat.localtest.me/saml2/metadata/"
    show_if: "certificat.login_method=saml"
    group: certificat_saml

  - variable: certificat.saml.sp.key_file
    label: "SAML SP Key File Path"
    description: "Path to the private key file for the SP"
    type: string
    default: "/etc/certificat/insecure.key"
    show_if: "certificat.login_method=saml"
    group: certificat_saml

  - variable: certificat.saml.sp.cert_file
    label: "SAML SP Cert File Path"
    description: "Path to the certificate file for the SP"
    type: string
    default: "/etc/certificat/insecure.crt"
    show_if: "certificat.login_method=saml"
    group: certificat_saml

  - variable: certificat.saml.idp.remote_url
    label: "SAML IdP Remote Metadata URL"
    description: "Metadata URL for the remote Identity Provider"
    type: string
    default: "http://idp./saml2/metadata"
    show_if: "certificat.login_method=saml"
    group: certificat_saml

  - variable: certificat.saml.attribute_mapping.eduPersonPrincipalName
    label: "SAML Attribute Mapping: eduPersonPrincipalName"
    description: "Maps to the Django username field"
    type: string
    default: username
    show_if: "certificat.login_method=saml"
    group: certificat_saml

  - variable: certificat.saml.attribute_mapping.mail
    label: "SAML Attribute Mapping: mail"
    description: "Maps to the Django email field"
    type: string
    default: email
    show_if: "certificat.login_method=saml"
    group: certificat_saml

  - variable: certificat.saml.attribute_mapping.givenName
    label: "SAML Attribute Mapping: givenName"
    description: "Maps to the Django first_name field"
    type: string
    default: first_name
    show_if: "certificat.login_method=saml"
    group: certificat_saml

  - variable: certificat.saml.attribute_mapping.sn
    label: "SAML Attribute Mapping: sn"
    description: "Maps to the Django last_name field"
    type: string
    default: last_name
    show_if: "certificat.login_method=saml"
    group: certificat_saml