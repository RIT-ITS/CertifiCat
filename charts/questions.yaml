  # SAML-Specific Fields
  - variable: certificat.saml.debug
    label: "SAML Debug Mode"
    description: "Enable debug logging for SAML"
    type: boolean
    default: false
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.administrators
    label: "SAML Admin Users"
    description: "Comma-separated list of admin usernames for SAML"
    type: string
    default: "admin"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.sp.entity_id
    label: "SAML SP Entity ID"
    description: "The Service Provider (SP) entity ID"
    type: string
    default: "http://certificat.localtest.me/saml2/metadata/"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.sp.key_file
    label: "SAML SP Private Key (PEM)"
    description: "Paste your private key (PEM format)"
    type: multiline
    default: |
      -----BEGIN PRIVATE KEY-----
      MIIEvAIBADANB...
      -----END PRIVATE KEY-----
    required: true
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.sp.cert_file
    label: "SAML SP Certificate (PEM)"
    description: "Paste your public certificate (PEM format)"
    type: multiline
    default: |
      -----BEGIN CERTIFICATE-----
      MIIEvAIBADANB...
      -----END CERTIFICATE-----
    required: true
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.idp.remote_url
    label: "SAML IdP Remote Metadata URL"
    description: "Metadata URL for the remote Identity Provider"
    type: string
    default: "http://idp./saml2/metadata"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

# saml.idp.mdq.url
  - variable: certificat.saml.idp.mdq.url
    label: "SAML IdP MDQ URL"
    description: "URL to the SAML metadata query (MDQ) service"
    type: string
    default: "http://mdq.incommon.org"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

# saml.idp.mdq.cert
  - variable: certificat.saml.idp.mdq.cert
    label: "SAML IdP MDQ Certificate Path"
    description: "Path to the cert used to verify metadata from the MDQ"
    type: string
    default: "/srv/www/config/inc-md-cert-mdq.pem"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

# saml.idp.mdq.freshness_period
  - variable: certificat.saml.idp.mdq.freshness_period
    label: "SAML IdP MDQ Freshness Period"
    description: "How long the IdP metadata is considered valid (e.g., P0Y0M0DT2H0M0S)"
    type: string
    default: "P0Y0M0DT2H0M0S"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.attribute_mapping.eduPersonPrincipalName
    label: "SAML Attribute Mapping: eduPersonPrincipalName"
    description: "Maps to the Django username field"
    type: string
    default: username
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.attribute_mapping.mail
    label: "SAML Attribute Mapping: mail"
    description: "Maps to the Django email field"
    type: string
    default: email
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.attribute_mapping.givenName
    label: "SAML Attribute Mapping: givenName"
    description: "Maps to the Django first_name field"
    type: string
    default: first_name
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.attribute_mapping.sn
    label: "SAML Attribute Mapping: sn"
    description: "Maps to the Django last_name field"
    type: string
    default: last_name
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"
#Sectigo Finalizer
  - variable: sectigo_finalizer.org_id
    label: "Organization ID"
    type: int
    default: 12345
    description: "Organization or department ID assigned by Sectigo"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.cert_profile_id
    label: "Certificate Profile ID"
    type: int
    default: 12345
    description: "The certificate profile ID found in the Sectigo Cert Manager UI"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.cert_validity_period
    label: "Certificate Validity Period (days)"
    type: int
    default: 90
    description: "Validity period of the certificate in days (must match the profile's options)"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.customer_uri
    label: "Customer URI"
    type: string
    default: "InCommon"
    description: "Sectigo customer URI (e.g., InCommon, ACME, etc.)"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.api_base
    label: "API Base URL"
    type: string
    default: "https://cert-manager.com/api/"
    description: "Base URL for Sectigo API endpoints"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.api_user
    label: "API Username"
    type: string
    default: "api@acme.edu"
    description: "Primary API username for certificate requests"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.api_password
    label: "API Password"
    type: password
    default: "password-for-api-user"
    description: "Password for the primary API user"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.approval_api_user
    label: "Approver Username"
    type: string
    default: "api-approver@acme.edu"
    description: "Optional separate API user for certificate approvals (if required)"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: false
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.approval_api_password
    label: "Approver Password"
    type: password
    default: "password-for-api-approver-user"
    description: "Password for the certificate approval API user"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: false
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.external_requester_override
    label: "External Requester Email"
    type: string
    default: "certs@acme.edu"
    description: "Email address to receive certificate lifecycle alerts"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: false
    group: "Sectigo Finalizer"
