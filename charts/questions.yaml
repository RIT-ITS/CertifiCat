groups:
  - name: "Certificat SAML"
    label: "Certificat SAML Configuration"
  - name: "Sectigo Finalizer"
    label: "Sectigo Finalizer Configuration"
  - name: "CertiNext Finalizer"
    label: "CertiNext Finalizer Configuration"

questions:
  - variable: persistentVolumeClaim.storageClassName
    default: nfs-client
    description: What storage class to use for the PersistentVolumeClaim
    type: string
    label: Storage Class for PVC

  - variable: ingress.hostname
    default: certificat.example
    description: Hostname of your Certificat Instance
    type: string
    label: Hostname

  - variable: certificat_image.repository
    default: ghcr.io/rit-its/certificat
    description: Repository URL for the Certificat container image
    type: string
    label: Repository

  - variable: certificat_image.tag
    label: Image Tag
    description: "Leave blank to use default (chart version); use 'latest' to pull the latest image"
    type: string
    required: false
    default: latest

  - variable: certificat.logging.certificat_level
    label: "Logging Level: Certificat"
    description: "Log level for CertifiCat app"
    type: string
    default: "DEBUG"

  - variable: certificat.logging.acmev2_level
    label: "Logging Level: ACMEv2"
    description: "Log level for ACME module"
    type: string
    default: "DEBUG"

  - variable: http_proxy
    label: "HTTP Proxy"
    description: "Proxy address for HTTP traffic"
    type: string
    required: true
    default: "http://proxy:port"

  - variable: https_proxy
    label: "HTTPS Proxy"
    description: "Proxy address for HTTPS traffic."
    type: string
    required: true
    default: "http://proxy:port"

  - variable: no_proxy
    label: "No Proxy Domains"
    description: "Comma-separated list of domains or IPs to bypass proxy."
    type: string
    required: true
    default: "localhost,127.0.0.1,::1,*.svc,*.svc.cluster.local,kubernetes.default"

  - variable: certificat.login_method
    label: "Login Method"
    description: "Choose authentication mode for CertifiCat"
    type: enum
    required: true
    default: "local"
    options:
      - "saml"
      - "local"

  - variable: certificat.finalizer_module
    label: "Finalizer Module"
    description: "Choose how CertifiCat will issue certificates"
    type: enum
    default: "certificat.modules.acme.backends.local.LocalFinalizer"
    options:
      - "certificat.modules.acme.backends.local.LocalFinalizer"
      - "certificat.modules.acme.backends.sectigo.SectigoFinalizer"
      - "certificat.modules.acme.backends.certinext.CertinextFinalizer"

  - variable: certificat.local_finalizer.key
    label: "Local Finalizer Private Key"
    description: "Paste your internal CA private key (PEM format)"
    type: multiline
    required: true
    default: |
      -----BEGIN RSA PRIVATE KEY-----
      MIICXAIBAAKBgQC7Zc9mK7P9...
      -----END RSA PRIVATE KEY-----
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.local.LocalFinalizer"

  - variable: certificat.local_finalizer.cert
    label: "Local Finalizer Certificate"
    description: "Paste your internal CA public certificate (PEM format)"
    type: multiline
    required: true
    default: |
      -----BEGIN CERTIFICATE-----
      MIIC0jCCAbqgAwIBAgIJALY...
      -----END CERTIFICATE-----
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.local.LocalFinalizer"

##
# SAML-Specific Fields
##

  - variable: certificat.saml.debug
    label: "SAML Debug Mode"
    description: "Enable debug logging for SAML"
    type: boolean
    default: false
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.administrators
    label: "SAML Admin Users"
    description: "Comma-separated list of admin usernames for SAML"
    type: string
    default: "admin"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.sp.entity_id
    label: "SAML SP Entity ID"
    description: "The Service Provider (SP) entity ID"
    type: string
    default: "http://certificat.localtest.me/saml2/metadata/"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.sp.key_file
    label: "SAML SP Private Key (PEM)"
    description: "Paste your private key (PEM format)"
    type: multiline
    default: |
      -----BEGIN PRIVATE KEY-----
      MIIEvAIBADANB...
      -----END PRIVATE KEY-----
    required: true
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.sp.cert_file
    label: "SAML SP Certificate (PEM)"
    description: "Paste your public certificate (PEM format)"
    type: multiline
    default: |
      -----BEGIN CERTIFICATE-----
      MIIEvAIBADANB...
      -----END CERTIFICATE-----
    required: true
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.idp.remote_url
    label: "SAML IdP Remote Metadata URL"
    description: "Metadata URL for the remote Identity Provider"
    type: string
    default: "http://idp./saml2/metadata"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.idp.mdq.url
    label: "SAML IdP MDQ URL"
    description: "URL to the SAML metadata query (MDQ) service"
    type: string
    default: "http://mdq.incommon.org"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.idp.mdq.cert
    label: "SAML IdP MDQ Certificate Path"
    description: "Path to the cert used to verify metadata from the MDQ"
    type: string
    default: "/srv/www/config/inc-md-cert-mdq.pem"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.idp.mdq.freshness_period
    label: "SAML IdP MDQ Freshness Period"
    description: "How long the IdP metadata is considered valid (e.g., P0Y0M0DT2H0M0S)"
    type: string
    default: "P0Y0M0DT2H0M0S"
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.attribute_mapping.eduPersonPrincipalName
    label: "SAML Attribute Mapping: eduPersonPrincipalName"
    description: "Maps to the Django username field"
    type: string
    default: username
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.attribute_mapping.mail
    label: "SAML Attribute Mapping: mail"
    description: "Maps to the Django email field"
    type: string
    default: email
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.attribute_mapping.givenName
    label: "SAML Attribute Mapping: givenName"
    description: "Maps to the Django first_name field"
    type: string
    default: first_name
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

  - variable: certificat.saml.attribute_mapping.sn
    label: "SAML Attribute Mapping: sn"
    description: "Maps to the Django last_name field"
    type: string
    default: last_name
    show_if: "certificat.login_method=saml"
    group: "Certificat SAML"

##
#Sectigo Finalizer
##

  - variable: sectigo_finalizer.org_id
    label: "Organization ID"
    type: int
    default: 12345
    description: "Organization or department ID assigned by Sectigo"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.cert_profile_id
    label: "Certificate Profile ID"
    type: int
    default: 12345
    description: "The certificate profile ID found in the Sectigo Cert Manager UI"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.cert_validity_period
    label: "Certificate Validity Period (days)"
    type: int
    default: 90
    description: "Validity period of the certificate in days (must match the profile's options)"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.customer_uri
    label: "Customer URI"
    type: string
    default: "InCommon"
    description: "Sectigo customer URI (e.g., InCommon, ACME, etc.)"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.api_base
    label: "API Base URL"
    type: string
    default: "https://cert-manager.com/api/"
    description: "Base URL for Sectigo API endpoints"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.api_user
    label: "API Username"
    type: string
    default: "api@acme.edu"
    description: "Primary API username for certificate requests"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.api_password
    label: "API Password"
    type: password
    default: "password-for-api-user"
    description: "Password for the primary API user"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: true
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.approval_api_user
    label: "Approver Username"
    type: string
    default: "api-approver@acme.edu"
    description: "Optional separate API user for certificate approvals (if required)"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: false
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.approval_api_password
    label: "Approver Password"
    type: password
    default: "password-for-api-approver-user"
    description: "Password for the certificate approval API user"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: false
    group: "Sectigo Finalizer"

  - variable: sectigo_finalizer.external_requester_override
    label: "External Requester Email"
    type: string
    default: "certs@acme.edu"
    description: "Email address to receive certificate lifecycle alerts"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.sectigo.SectigoFinalizer"
    required: false
    group: "Sectigo Finalizer"

##
# CertiNext Finalizer
##

  - variable: certinext_finalizer.client_id
    label: "Account Number (Client ID)"
    type: string
    description: "Your CertiNext account number (OAuth client ID)"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: true
    group: "CertiNext Finalizer"

  - variable: certinext_finalizer.client_secret
    label: "Client Secret"
    type: password
    description: "OAuth client secret from the CertiNext portal (Integrations → APIs)"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: true
    group: "CertiNext Finalizer"

  - variable: certinext_finalizer.product
    label: "Certificate Product"
    type: enum
    default: "dv"
    description: "Validation level for issued certificates"
    options:
      - "dv"
      - "ov"
      - "ev"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: true
    group: "CertiNext Finalizer"

  - variable: certinext_finalizer.organization_id
    label: "Organization ID"
    type: string
    description: "CertiNext organization ID — required for OV and EV orders"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: false
    group: "CertiNext Finalizer"

  - variable: certinext_finalizer.validity_years
    label: "Validity Years"
    type: int
    default: 1
    description: "Certificate validity period in years (1, 2, or 3)"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: false
    group: "CertiNext Finalizer"

  - variable: certinext_finalizer.sandbox
    label: "Use Sandbox"
    type: boolean
    default: false
    description: "Connect to the CertiNext sandbox environment instead of production"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: false
    group: "CertiNext Finalizer"

  - variable: certinext_finalizer.requestor_name
    label: "Requestor Name"
    type: string
    default: "Certificate Automation"
    description: "Default requestor name attached to certificate orders"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: false
    group: "CertiNext Finalizer"

  - variable: certinext_finalizer.requestor_email
    label: "Requestor Email"
    type: string
    default: "certs@example.edu"
    description: "Default requestor email. Overrides the ACME account binding email when set."
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: false
    group: "CertiNext Finalizer"

  - variable: certinext_finalizer.signer_name
    label: "Signer Name"
    type: string
    default: "Certificate Automation"
    description: "Name of the person accepting the subscriber agreement"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: false
    group: "CertiNext Finalizer"

  - variable: certinext_finalizer.signer_place
    label: "Signer Location"
    type: string
    default: "Portland, ME"
    description: "City and state of the agreement signer (e.g. Portland, ME)"
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: false
    group: "CertiNext Finalizer"

  - variable: certinext_finalizer.prevetting_token
    label: "Organization Consent Token"
    type: password
    description: "OV/EV only: bypasses the pending-approval stage when set. Retrieve from the CertiNext Enterprise Portal under Organization Management."
    show_if: "certificat.finalizer_module=certificat.modules.acme.backends.certinext.CertinextFinalizer"
    required: false
    group: "CertiNext Finalizer"
