{{- $top := $ }}  # Save the top-level context
{{- range $key, $secret := .Values.secretProviders }}
{{- if $secret.enabled }}

  {{- $secretNamespace := $top.Release.Namespace }}
  {{- $lookupData := (lookup "v1" "Secret" $secretNamespace $secret.name).data }}

---
apiVersion: v1
kind: Secret
metadata:
  name: "{{ $secret.name }}"
  namespace: {{ $secretNamespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
type: "{{ $secret.type }}"
data:
  {{- if eq $secret.type "Generated" }}
    {{- range $key := $secret.keys }}
    {{ $key }}: "{{ ((get $lookupData $key) | default (randAlphaNum 30 | b64enc)) }}"
    {{- end }}
  {{ else }}
    {{- range $key, $val := $secret.initialData }}
      {{- if eq $key "certificat.yml" }}
      {{ $key }}: "{{ tpl ($top.Files.Get "files/certificat.tpl.yml") $top | b64enc }}"
      {{- else }}
      {{ $key }}: "{{ ((get $lookupData $key) | default ($val | b64enc)) }}"
      {{- end }}
    {{- end }}
  {{- end }}

{{- end }}
{{- end }}

{{/* ---- Additional static secret: certificat-saml-sp ---- */}}
{{- $certificat := index .Values.secretProviders "certificat" }}
{{- if and $certificat.enabled $certificat.initialData.sp.key $certificat.initialData.sp.crt }}
---
apiVersion: v1
kind: Secret
metadata:
  name: certificat-saml-sp
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: Helm
type: Opaque
data:
  sp.key: "{{ $certificat.initialData.sp.key | b64enc }}"
  sp.crt: "{{ $certificat.initialData.sp.crt | b64enc }}"
{{- end }}
