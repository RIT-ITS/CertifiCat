groups:
  - name: "Certificat SAML"
    label: "Certificat SAML Configuration"
  - name: "Sectigo Finalizer"
    label: "Sectigo Finalizer Configuration"

questions:
  - variable: persistentVolumeClaim.storageClassName
    default: nfs-client
    description: What storage class to use for the PersistentVolumeClaim
    type: string
    label: Storage Class for PVC

  - variable: ingress.hostname
    default: certificat.k8s-admin.its.maine.edu
    description: Hostname of your Certificat Instance
    type: string
    label: Hostname

  - variable: certificat_image.repository
    default: ghcr.io/rit-its/certificat
    description: Repository URL for the Certificat container image
    type: string
    label: Repository

  - variable: certificat_image.tag
    label: Image Tag
    description: "Leave blank to use default (chart version); use 'latest' to pull the latest image"
    type: string
    required: false
    default: latest

  - variable: certificat.logging.certificat_level
    label: "Logging Level: Certificat"
    description: "Log level for CertifiCat app"
    type: string
    default: "DEBUG"

  - variable: certificat.logging.acmev2_level
    label: "Logging Level: ACMEv2"
    description: "Log level for ACME module"
    type: string
    default: "DEBUG"

  - variable: certificat.login_method
    label: "Login Method"
    description: "Choose authentication mode for CertifiCat"
    type: enum
    required: true
    default: "local"
    options:
      - "saml"
      - "local_account"

  - variable: certificat.finalizer_module
    label: "Finalizer Module"
    description: "Choose how CertifiCat will issue certificates"
    type: enum
    default: "certificat.modules.acme.backends.local.LocalFinalizer"
    options:
      - "certificat.modules.acme.backends.local.LocalFinalizer"
      - "certificat.modules.acme.backends.sectigo.SectigoFinalizer"

