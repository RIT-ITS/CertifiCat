certificat:
  url_root: "https://{{ .Values.ingress.hostname }}"
  login_method: {{ .Values.certificat.login_method | quote }}
  finalizer_module: {{ .Values.certificat.finalizer_module | quote }}
  db:
    name: certificat
    user: certificat
    host: mariadb-service.{{ .Release.Namespace }}
  redis:
    host: redis-service.{{ .Release.Namespace }}

{{- if eq $.Values.certificat.login_method "saml" }}
saml:
  debug: {{ $.Values.certificat.saml.debug }}
  administrators:
    {{- $admins := split "," $.Values.certificat.saml.administrators }}
    {{- range $admins }}
    - "{{ . | trim }}"
    {{- end }}
  attribute_mapping:
    eduPersonPrincipalName: ["{{ $.Values.certificat.saml.attribute_mapping.eduPersonPrincipalName }}"]
    mail: ["{{ $.Values.certificat.saml.attribute_mapping.mail }}"]
    givenName: ["{{ $.Values.certificat.saml.attribute_mapping.givenName }}"]
    sn: ["{{ $.Values.certificat.saml.attribute_mapping.sn }}"]
  sp:
    entity_id: "{{ $.Values.certificat.saml.sp.entity_id }}"
    key_file: "{{ $.Values.certificat.saml.sp.key_file }}"
    cert_file: "{{ $.Values.certificat.saml.sp.cert_file }}"
  {{- if $.Values.certificat.saml.idp.remote_url }}
  idp:
    remote:
      - url: "{{ $.Values.certificat.saml.idp.remote_url }}"
  {{- else }}
  idp:
    mdq:
      - url: "{{ $.Values.certificat.saml.idp.mdq.url }}"
        cert: "{{ $.Values.certificat.saml.idp.mdq.cert }}"
        freshness_period: "{{ $.Values.certificat.saml.idp.mdq.freshness_period }}"
  {{- end }}
{{- end }}


{{- if eq .Values.certificat.finalizer_module "certificat.modules.acme.backends.sectigo.SectigoFinalizer" }}
{{- $sectigo_vals := .Values.sectigo_finalizer | default dict }}
{{- $sectigo_secret := lookup "v1" "Secret" .Release.Namespace "certificat-sectigo-secret" }}

{{- $api_user := $sectigo_vals.api_user | default "" }}
{{- $api_password := $sectigo_vals.api_password | default "" }}
{{- $approval_user := $sectigo_vals.approval_api_user | default "" }}
{{- $approval_pass := $sectigo_vals.approval_api_password | default "" }}

{{- if and (eq $api_user "") (hasKey $sectigo_secret "data") (hasKey $sectigo_secret.data "api_user") }}
  {{- $api_user = $sectigo_secret.data.api_user | b64dec }}
{{- end }}
{{- if and (eq $api_password "") (hasKey $sectigo_secret "data") (hasKey $sectigo_secret.data "api_password") }}
  {{- $api_password = $sectigo_secret.data.api_password | b64dec }}
{{- end }}
{{- if and (eq $approval_user "") (hasKey $sectigo_secret "data") (hasKey $sectigo_secret.data "approval_api_user") }}
  {{- $approval_user = $sectigo_secret.data.approval_api_user | b64dec }}
{{- end }}
{{- if and (eq $approval_pass "") (hasKey $sectigo_secret "data") (hasKey $sectigo_secret.data "approval_api_password") }}
  {{- $approval_pass = $sectigo_secret.data.approval_api_password | b64dec }}
{{- end }}

sectigo_finalizer:
  org_id: {{ $sectigo_vals.org_id | default "" }}
  cert_profile_id: {{ $sectigo_vals.cert_profile_id | default "" }}
  cert_validity_period: {{ $sectigo_vals.cert_validity_period | default "" }}
  customer_uri: "{{ $sectigo_vals.customer_uri | default "" }}"
  api_base: "{{ $sectigo_vals.api_base | default "" }}"
  api_user: "{{ $api_user }}"
  api_password: "{{ $api_password }}"
  approval_api_user: "{{ $approval_user }}"
  approval_api_password: "{{ $approval_pass }}"
  external_requester_override: "{{ $sectigo_vals.external_requester_override | default "" }}"
{{- end }}

{{- if eq .Values.certificat.finalizer_module "certificat.modules.acme.backends.local.LocalFinalizer" }}
  {{- if or .Values.certificat.local_finalizer.key .Values.certificat.local_finalizer.cert }}
local_finalizer:
    {{- if .Values.certificat.local_finalizer.key }}
  key: |
{{ .Values.certificat.local_finalizer.key | nindent 4 }}
    {{- end }}
    {{- if .Values.certificat.local_finalizer.cert }}
  cert: |
{{ .Values.certificat.local_finalizer.cert | nindent 4 }}
    {{- end }}
  {{- end }}
{{- end }}